name: Build & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  SSH_USER: ${{ secrets.SSH_USER || 'ubuntu' }}
  SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '~/Astro-star' }}
  PM2_APP_NAME: ${{ secrets.PM2_APP_NAME || 'Astro-star' }}
  APP_PORT: ${{ secrets.APP_PORT || '4321' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # ── Source hash: skip build if nothing changed ──
      - name: Compute source hash
        id: hash
        run: |
          HASH=${{ hashFiles('src/**', 'public/**', 'package.json', 'pnpm-lock.yaml', 'astro.config.mjs') }}
          echo "source_hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Check hash cache
        id: cache
        uses: actions/cache@v5
        with:
          path: .hash-marker
          key: deploy-hash-${{ steps.hash.outputs.source_hash }}

      - name: Skip notice
        if: steps.cache.outputs.cache-hit == 'true'
        run: echo "Source unchanged — skipping build & deploy."

      # ── Build ──
      - name: Setup pnpm
        if: steps.cache.outputs.cache-hit != 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: pnpm build

      # ── Deploy via rsync + SSH ──
      - name: Setup SSH
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ env.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync to server
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          rsync -a --checksum --delete \
            --exclude='node_modules' \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ env.SSH_PORT }}" \
            dist/ package.json pnpm-lock.yaml \
            ${{ env.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: Deploy runtime env vars
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          echo "WALINE_SERVER_URL=${{ secrets.PUBLIC_WALINE_SERVER_URL }}" | \
            ssh -i ~/.ssh/deploy_key -p ${{ env.SSH_PORT }} \
              ${{ env.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "cat > ${{ env.DEPLOY_PATH }}/.env"

      - name: Install & restart on server
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ env.SSH_PORT }} \
            ${{ env.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "source ~/.nvm/nvm.sh 2>/dev/null; source ~/.bashrc 2>/dev/null; cd ${{ env.DEPLOY_PATH }} && pnpm install --prod --frozen-lockfile && (pm2 delete ${{ env.PM2_APP_NAME }} 2>/dev/null; PORT=${{ env.APP_PORT }} pm2 start server/entry.mjs --name ${{ env.PM2_APP_NAME }} --node-args='--env-file=.env') && pm2 save"

      - name: Cleanup SSH
        if: steps.cache.outputs.cache-hit != 'true'
        run: rm -f ~/.ssh/deploy_key

      # ── Save hash marker on success ──
      - name: Save hash marker
        if: steps.cache.outputs.cache-hit != 'true'
        run: echo "${{ steps.hash.outputs.source_hash }}" > .hash-marker

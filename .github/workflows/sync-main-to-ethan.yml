name: Sync main to Ethan

on:
  workflow_dispatch:
  schedule:
    - cron: "17,47 * * * *"
  push:
    branches: [main]

concurrency:
  group: sync-main-to-ethan
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository == 'hanlife02/Astro-star'
    runs-on: ubuntu-latest
    steps:
      - name: Check deployment PAT
        env:
          ACTIONS_PAT: ${{ secrets.ACTIONS_PAT }}
        run: |
          if [ -z "$ACTIONS_PAT" ]; then
            echo "::error::Missing ACTIONS_PAT secret. Use a PAT with repo and workflow scopes so pushing Ethan can trigger deploys and sync workflow file changes."
            exit 1
          fi

      - name: Checkout Ethan
        uses: actions/checkout@v5
        with:
          ref: Ethan
          fetch-depth: 0
          token: ${{ secrets.ACTIONS_PAT }}

      - name: Merge main into Ethan while preserving personal content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          set +e
          git merge --no-commit --no-ff origin/main
          merge_status=$?
          set -e

          if ! git rev-parse -q --verify MERGE_HEAD >/dev/null; then
            if [ "$merge_status" -ne 0 ]; then
              echo "::error::Merge failed before creating a merge state."
              exit "$merge_status"
            fi

            echo "Ethan already includes main."
            exit 0
          fi

          personal_paths=(
            docs
            public/avatar.svg
            public/figures
            public/reward
            public/site-icon.svg
            src/config
            src/content
          )

          template_only_paths=(
            docs/template-customization.md
            src/content/blog/template/welcome-to-astro-star.mdx
            src/content/note/thoughts/first-note.mdx
            src/content/project/astro-star-template.mdx
          )

          personal_additions="$(mktemp)"
          git diff --cached --name-only -z --diff-filter=A -- "${personal_paths[@]}" > "$personal_additions"
          if [ -s "$personal_additions" ]; then
            xargs -0 git rm -rf --ignore-unmatch -- < "$personal_additions"
          fi
          rm -f "$personal_additions"

          git restore --source=HEAD --staged --worktree -- "${personal_paths[@]}" 2>/dev/null || true
          git clean -fd -- "${personal_paths[@]}"
          git rm -rf --ignore-unmatch -- "${template_only_paths[@]}"

          remaining_conflicts="$(git diff --name-only --diff-filter=U)"
          if [ -n "$remaining_conflicts" ]; then
            echo "Resolving template-owned conflicts with main:"
            echo "$remaining_conflicts"

            while IFS= read -r conflict_path; do
              case "$conflict_path" in
                docs|docs/*|public/avatar.svg|public/figures|public/figures/*|public/reward|public/reward/*|public/site-icon.svg|src/config|src/config/*|src/content|src/content/*)
                  echo "::error::Protected path conflict remained after restore: $conflict_path"
                  exit 1
                  ;;
                *)
                  git checkout --theirs -- "$conflict_path"
                  git add -- "$conflict_path"
                  ;;
              esac
            done <<< "$remaining_conflicts"
          fi

          if git diff --cached --quiet; then
            echo "No file changes after preserving personal content; recording merge ancestry."
          fi

          git status --short
          git commit --allow-empty -m "chore(deploy): sync main template changes into Ethan"
          git push origin Ethan
